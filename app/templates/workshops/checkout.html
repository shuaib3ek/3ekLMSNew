<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Payment — {{ registration.workshop.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkout-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            margin: 24px;
        }

        .checkout-header {
            background: linear-gradient(135deg, #0f172a 0%, #0369a1 100%);
            padding: 32px 32px 24px;
            color: #fff;
            text-align: center;
        }

        .event-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .checkout-body {
            padding: 32px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        .detail-label {
            color: #64748b;
        }

        .detail-value {
            font-weight: 600;
            text-align: right;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 20px 0 10px;
            font-size: 18px;
            font-weight: 800;
            color: #0f172a;
            border-top: 2px solid #e2e8f0;
            margin-top: 8px;
        }

        .pay-btn {
            width: 100%;
            background: #0369a1;
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .pay-btn:hover {
            opacity: 0.9;
        }

        .brand {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="checkout-card">
        <div class="checkout-header">
            <div
                style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #7dd3fc; margin-bottom: 8px;">
                Workshop Payment</div>
            <h1 class="event-title">{{ registration.workshop.title }}</h1>
        </div>

        <div class="checkout-body">
            <div class="detail-row">
                <span class="detail-label">Name</span>
                <span class="detail-value">{{ registration.name }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Email</span>
                <span class="detail-value">{{ registration.email }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Date</span>
                <span class="detail-value">{{ registration.workshop.start_date.strftime('%d %b %Y') }}</span>
            </div>

            <div class="total-row">
                <span>Total Amount</span>
                <span>₹{{ '{:,.2f}'.format(amount / 100) }}</span>
            </div>

            <button id="rzp-button" class="pay-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0110 0v4"></path>
                </svg>
                Securely Pay ₹{{ '{:,.0f}'.format(amount / 100) }}
            </button>

            <div class="brand">
                Payments processed securely by <strong>Razorpay</strong><br>
                Service provided by 3EK
            </div>
        </div>
    </div>

    <!-- Razorpay Checkput Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        var options = {
            "key": "{{ key_id }}",
            "amount": "{{ amount }}", // Amount is in currency subunits. Default currency is INR. Hence, 50000 refers to 50000 paise
            "currency": "{{ currency }}",
            "name": "3 Essential Keys",
            "description": "Registration for {{ registration.workshop.title|replace('\"','\\\"') }}",
            "image": "https://app1.3ek.in/static/images/logo.png",
            "order_id": "{{ order_id }}",
            "callback_url": "{{ url_for('workshops.payment_callback', _external=True) }}",
            "prefill": {
                "name": "{{ registration.name|replace('\"','\\\"') }}",
                "email": "{{ registration.email|replace('\"','\\\"') }}",
                "contact": "{{ registration.phone|default('', true)|replace('\"','\\\"') }}"
            },
            "notes": {
                "registration_token": "{{ registration.confirmation_token }}"
            },
            "theme": {
                "color": "#0369a1"
            }
        };
        var rzp1 = new Razorpay(options);
        document.getElementById('rzp-button').onclick = function (e) {
            rzp1.open();
            e.preventDefault();
        }
    </script>
</body>

</html>
