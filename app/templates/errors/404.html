{% extends "layouts/base.html" %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: 60vh; padding: 2rem;">
    <div style="text-align: center; max-width: 500px;">
        <div style="font-size: 8rem; font-weight: 700; color: var(--primary); line-height: 1;">404</div>
        <h1 style="font-size: 2rem; margin: 1rem 0; color: var(--text-main);">Page Not Found</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem; font-size: 1.1rem;">
            The page you're looking for doesn't exist or has been moved.
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <a href="javascript:history.back()" class="btn btn-outline">
                <i class="ph ph-arrow-left"></i> Go Back
            </a>
            <a href="/" class="btn btn-primary">
                <i class="ph ph-house"></i> Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
